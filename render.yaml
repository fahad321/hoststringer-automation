services:
  - type: web
    name: hoststringer-automation
    runtime: node
    plan: free
    buildCommand: npm ci --omit=dev && PLAYWRIGHT_BROWSERS_PATH=0 npx playwright install chromium
    startCommand: node src/index.js
    healthCheckPath: /api/health
    autoDeploy: yes
    envVars:
      - key: NODE_ENV
        value: production
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
